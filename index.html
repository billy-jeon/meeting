<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정리록 · 회의를 기록하고 정리합니다</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C2321;
    --paper:#EFEDE4;
    --paper-raised:#F8F6EF;
    --terminal:#161B19;
    --terminal-line:#232B28;
    --rec:#C6462E;
    --rec-dim:#C6462E33;
    --teal:#2F6F62;
    --teal-dim:#2F6F6222;
    --amber:#D99A3E;
    --muted:#71695C;
    --muted-2:#8A9C93;
    --hairline:#D9D4C5;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans KR', sans-serif;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .display{font-family:'Space Grotesk', 'Noto Sans KR', sans-serif;}
  .mono{font-family:'IBM Plex Mono', monospace;}

  /* ---------- Header ---------- */
  header{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:18px;
    padding:14px 22px;
    border-bottom:1px solid var(--hairline);
    background:var(--paper-raised);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-right:auto;
  }
  .brand-mark{
    width:30px;height:30px;
    border-radius:50%;
    background:var(--ink);
    position:relative;
    flex:0 0 auto;
  }
  .brand-mark svg{position:absolute;inset:0;}
  .brand-text .title{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:17px;
    letter-spacing:0.01em;
  }
  .brand-text .subtitle{
    font-size:11.5px;
    color:var(--muted);
    margin-top:1px;
  }

  .rec-btn{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 18px 9px 14px;
    border-radius:999px;
    border:1.5px solid var(--ink);
    background:var(--ink);
    color:var(--paper-raised);
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:background .15s ease, color .15s ease, transform .1s ease;
    user-select:none;
  }
  .rec-btn:active{transform:scale(0.97);}
  .rec-btn.recording{
    background:var(--rec);
    border-color:var(--rec);
    color:#fff;
  }
  .rec-dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--muted-2);
    flex:0 0 auto;
  }
  .rec-btn.recording .rec-dot{
    background:#fff;
    animation:pulse 1.1s infinite ease-in-out;
  }
  @keyframes pulse{
    0%,100%{opacity:1; transform:scale(1);}
    50%{opacity:.45; transform:scale(.72);}
  }

  #waveform{
    width:64px;height:28px;
    display:block;
    opacity:0.85;
  }

  .timer{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color:var(--muted);
    min-width:52px;
  }

  .icon-btn{
    width:34px;height:34px;
    border-radius:50%;
    border:1px solid var(--hairline);
    background:transparent;
    color:var(--muted);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    font-size:15px;
  }
  .icon-btn:hover{background:var(--paper); color:var(--ink);}

  /* ---------- Settings popover ---------- */
  .popover{
    position:absolute;
    top:60px; right:22px;
    width:320px;
    background:var(--paper-raised);
    border:1px solid var(--hairline);
    border-radius:var(--radius);
    box-shadow:0 12px 28px rgba(28,35,33,0.14);
    padding:16px;
    display:none;
    z-index:50;
  }
  .popover.open{display:block;}
  .popover label{
    font-size:12px;
    color:var(--muted);
    display:block;
    margin-bottom:6px;
  }
  .popover input[type=password], .popover input[type=text]{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--hairline);
    border-radius:6px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    background:#fff;
    color:var(--ink);
  }
  .popover .hint{
    font-size:11px;
    color:var(--muted-2);
    margin-top:8px;
    line-height:1.5;
  }
  .popover select{
    width:100%;
    padding:8px 9px;
    border:1px solid var(--hairline);
    border-radius:6px;
    background:#fff;
    font-size:12.5px;
    margin-top:4px;
  }
  .field-row{margin-bottom:14px;}
  .popover .close-row{
    display:flex; justify-content:flex-end; margin-top:4px;
  }
  .mini-btn{
    border:none; background:var(--teal); color:#fff;
    font-size:12px; padding:7px 14px; border-radius:6px; cursor:pointer;
    font-family:'Space Grotesk', sans-serif; font-weight:600;
  }

  /* ---------- Main split ---------- */
  main{
    flex:1 1 auto;
    display:flex;
    min-height:0;
  }
  .panel{
    flex:1 1 50%;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  .panel-head{
    flex:0 0 auto;
    padding:14px 22px 10px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  .panel-head .label{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:13px;
    letter-spacing:0.06em;
    text-transform:uppercase;
  }
  .panel-head .count{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
  }

  /* Left: organized notes (paper) */
  .notes-panel{
    background:var(--paper-raised);
    border-right:1px solid var(--hairline);
  }
  .notes-panel .panel-head .label{color:var(--teal);}
  .notes-panel .panel-head .count{color:var(--muted);}
  .notes-body{
    flex:1 1 auto;
    overflow-y:auto;
    padding:6px 22px 24px;
  }
  #notesEditor{
    min-height:100%;
    outline:none;
    font-size:15.5px;
    line-height:1.85;
    color:var(--ink);
  }
  #notesEditor ul{margin:0; padding-left:0; list-style:none;}
  #notesEditor li{
    position:relative;
    padding-left:20px;
    margin-bottom:10px;
  }
  #notesEditor li::before{
    content:"–";
    position:absolute; left:0; top:0;
    color:var(--teal);
    font-weight:700;
  }
  #notesEditor:empty::before{
    content:"녹음을 시작하면, 이 자리에 회의록 초안이 자동으로 채워집니다.";
    color:var(--muted-2);
    font-style:italic;
  }
  .organizing-flag{
    display:none;
    align-items:center;
    gap:7px;
    font-size:11.5px;
    color:var(--amber);
    padding:0 22px 8px;
    font-family:'IBM Plex Mono', monospace;
  }
  .organizing-flag.show{display:flex;}
  .spinner{
    width:9px;height:9px;border-radius:50%;
    border:1.5px solid var(--amber);
    border-top-color:transparent;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Right: live transcript (terminal) */
  .transcript-panel{
    background:var(--terminal);
    color:#D9E4DE;
  }
  .transcript-panel .panel-head .label{color:var(--muted-2);}
  .transcript-panel .panel-head .count{color:var(--muted-2);}
  .transcript-body{
    flex:1 1 auto;
    overflow-y:auto;
    padding:6px 22px 24px;
    font-family:'IBM Plex Mono', monospace;
    font-size:13.5px;
    line-height:1.75;
  }
  .transcript-body .empty{
    color:#4E5C56;
    font-style:italic;
  }
  .t-line{margin-bottom:2px; color:#D9E4DE;}
  .t-interim{color:#6E8078;}
  .t-line .t-time{color:#4E5C56; margin-right:8px;}

  /* ---------- Footer / prompt bar ---------- */
  footer{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 22px;
    border-top:1px solid var(--hairline);
    background:var(--paper-raised);
  }
  #promptInput{
    flex:1 1 auto;
    padding:11px 14px;
    border:1px solid var(--hairline);
    border-radius:999px;
    background:#fff;
    font-family:'Noto Sans KR', sans-serif;
    font-size:13.5px;
    color:var(--ink);
    outline:none;
  }
  #promptInput:focus{border-color:var(--teal);}
  .send-btn, .save-btn{
    flex:0 0 auto;
    border:none;
    border-radius:999px;
    padding:11px 18px;
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:13.5px;
    cursor:pointer;
  }
  .send-btn{background:var(--teal); color:#fff;}
  .send-btn:disabled, .save-btn:disabled{opacity:0.45; cursor:not-allowed;}
  .save-btn{background:var(--ink); color:var(--paper-raised);}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--hairline); border-radius:4px;}
  .transcript-panel ::-webkit-scrollbar-thumb{background:var(--terminal-line);}

  .toast{
    position:fixed;
    bottom:70px; left:50%; transform:translateX(-50%) translateY(10px);
    background:var(--ink); color:var(--paper-raised);
    padding:9px 18px; border-radius:999px;
    font-size:12.5px;
    opacity:0; pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:100;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (max-width: 760px){
    main{flex-direction:column;}
    .notes-panel{border-right:none; border-bottom:1px solid var(--hairline);}
    .panel{flex:1 1 50%;}
  }

  [contenteditable="true"]:focus{caret-color:var(--teal);}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 30 30" width="30" height="30">
        <circle cx="15" cy="15" r="15" fill="#1C2321"/>
        <path d="M9 17 L9 13 M13 20 L13 10 M17 22 L17 8 M21 17 L21 13" stroke="#EFEDE4" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="brand-text">
      <div class="title">정리록</div>
      <div class="subtitle">듣는 동안, 정리됩니다</div>
    </div>
  </div>

  <button class="rec-btn" id="recBtn">
    <span class="rec-dot"></span>
    <span id="recBtnLabel">녹음 시작</span>
  </button>
  <canvas id="waveform" width="64" height="28"></canvas>
  <span class="timer" id="timer">00:00</span>

  <button class="icon-btn" id="settingsBtn" title="설정">⚙</button>

  <div class="popover" id="settingsPopover">
    <div class="field-row">
      <label for="apiKeyInput">OpenAI API Key (이 세션에서만 사용, 저장되지 않음)</label>
      <input type="password" id="apiKeyInput" placeholder="sk-...">
    </div>
    <div class="field-row">
      <label for="modelSelect">정리에 사용할 모델</label>
      <select id="modelSelect">
        <option value="gpt-4o-mini" selected>gpt-4o-mini (빠르고 저렴)</option>
        <option value="gpt-4o">gpt-4o (품질 우선)</option>
      </select>
    </div>
    <div class="field-row">
      <label for="intervalSelect">자동 정리 주기</label>
      <select id="intervalSelect">
        <option value="60000">1분마다</option>
        <option value="300000">5분마다</option>
        <option value="600000">10분마다</option>
        <option value="1200000" selected>20분마다</option>
        <option value="0">자동 정리 끔 (수동으로만)</option>
      </select>
    </div>
    <div class="hint">
      API 키는 브라우저 메모리에만 저장되며 새로고침 시 사라집니다. GitHub Pages 등 정적 호스팅에 배포해도 키는 서버로 전송되지 않고, 클라이언트에서 직접 OpenAI로 요청을 보냅니다.
    </div>
    <div class="close-row">
      <button class="mini-btn" id="closePopoverBtn">닫기</button>
    </div>
  </div>
</header>

<main>
  <section class="panel notes-panel">
    <div class="panel-head">
      <span class="label display">정리된 회의록</span>
      <span class="count" id="notesCount"></span>
    </div>
    <div class="organizing-flag" id="organizingFlag"><span class="spinner"></span> 정리하는 중…</div>
    <div class="notes-body">
      <div id="notesEditor" contenteditable="true"></div>
    </div>
  </section>

  <section class="panel transcript-panel">
    <div class="panel-head">
      <span class="label display">실시간 스크립트</span>
      <span class="count" id="transcriptStatus">대기 중</span>
    </div>
    <div class="transcript-body" id="transcriptBody">
      <div class="empty">녹음 시작 버튼을 누르면 마이크로 들어오는 음성이 이 자리에 실시간으로 표시됩니다. (Chrome 브라우저 권장)</div>
    </div>
  </section>
</main>

<footer>
  <input type="text" id="promptInput" placeholder="예: 3번째 항목을 더 구체적으로 다시 써줘 / 결정사항만 따로 모아줘">
  <button class="send-btn" id="reviseBtn">수정 반영</button>
  <button class="save-btn" id="saveBtn">.txt로 저장</button>
</footer>

<div class="toast" id="toast"></div>

<script>
(function(){
  // ---------- State ----------
  let apiKey = "";
  let model = "gpt-4o-mini";
  let autoInterval = 1200000; // 20분 기본값
  let isRecording = false;
  let recognition = null;
  let finalTranscript = "";      // full committed transcript text
  let sinceLastOrganize = "";    // portion accumulated since last successful organize call
  let organizeTimer = null;
  let secondsElapsed = 0;
  let timerInterval = null;
  let audioCtx, analyser, micStream, waveAnimId;
  let isOrganizing = false;
  let isRevising = false;

  // ---------- DOM ----------
  const recBtn = document.getElementById('recBtn');
  const recBtnLabel = document.getElementById('recBtnLabel');
  const timerEl = document.getElementById('timer');
  const transcriptBody = document.getElementById('transcriptBody');
  const transcriptStatus = document.getElementById('transcriptStatus');
  const notesEditor = document.getElementById('notesEditor');
  const notesCount = document.getElementById('notesCount');
  const organizingFlag = document.getElementById('organizingFlag');
  const promptInput = document.getElementById('promptInput');
  const reviseBtn = document.getElementById('reviseBtn');
  const saveBtn = document.getElementById('saveBtn');
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsPopover = document.getElementById('settingsPopover');
  const closePopoverBtn = document.getElementById('closePopoverBtn');
  const apiKeyInput = document.getElementById('apiKeyInput');
  const modelSelect = document.getElementById('modelSelect');
  const intervalSelect = document.getElementById('intervalSelect');
  const waveformCanvas = document.getElementById('waveform');
  const waveCtx = waveformCanvas.getContext('2d');
  const toastEl = document.getElementById('toast');

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(()=> toastEl.classList.remove('show'), 2600);
  }

  // ---------- Settings popover ----------
  settingsBtn.addEventListener('click', ()=>{
    settingsPopover.classList.toggle('open');
  });
  closePopoverBtn.addEventListener('click', ()=> settingsPopover.classList.remove('open'));
  document.addEventListener('click', (e)=>{
    if(!settingsPopover.contains(e.target) && e.target !== settingsBtn && settingsPopover.classList.contains('open')){
      settingsPopover.classList.remove('open');
    }
  });
  apiKeyInput.addEventListener('input', (e)=> apiKey = e.target.value.trim());
  modelSelect.addEventListener('change', (e)=> model = e.target.value);
  intervalSelect.addEventListener('change', (e)=>{
    autoInterval = parseInt(e.target.value, 10);
    if(isRecording) restartAutoOrganizeTimer();
  });

  // ---------- Timer ----------
  function formatTime(s){
    const m = Math.floor(s/60).toString().padStart(2,'0');
    const sec = (s%60).toString().padStart(2,'0');
    return m + ':' + sec;
  }
  function startTimer(){
    secondsElapsed = 0;
    timerEl.textContent = '00:00';
    timerInterval = setInterval(()=>{
      secondsElapsed++;
      timerEl.textContent = formatTime(secondsElapsed);
    }, 1000);
  }
  function stopTimer(){
    clearInterval(timerInterval);
  }

  // ---------- Speech recognition ----------
  function getRecognitionCtor(){
    return window.SpeechRecognition || window.webkitSpeechRecognition || null;
  }

  let recognitionActive = false;   // true between onstart and onend
  let restartTimeoutId = null;
  let watchdogInterval = null;
  let lastResultAt = 0;

  function initRecognition(){
    const Ctor = getRecognitionCtor();
    if(!Ctor){
      toast('이 브라우저는 실시간 음성 인식을 지원하지 않습니다. Chrome을 사용해 주세요.');
      return null;
    }
    const r = new Ctor();
    r.lang = 'ko-KR';
    r.continuous = true;
    r.interimResults = true;
    r.maxAlternatives = 1;

    r.onstart = ()=>{
      recognitionActive = true;
      if(isRecording) transcriptStatus.textContent = '듣는 중';
    };

    r.onspeechstart = ()=>{
      if(isRecording) transcriptStatus.textContent = '음성 인식 중';
    };

    r.onspeechend = ()=>{
      if(isRecording) transcriptStatus.textContent = '듣는 중 (대기)';
    };

    r.onresult = (event)=>{
      lastResultAt = Date.now();
      let interim = '';
      for(let i = event.resultIndex; i < event.results.length; i++){
        const res = event.results[i];
        if(res.isFinal){
          const text = res[0].transcript.trim();
          if(text){
            finalTranscript += (finalTranscript ? ' ' : '') + text;
            sinceLastOrganize += (sinceLastOrganize ? ' ' : '') + text;
            renderFinalLine(text);
          }
        } else {
          interim += res[0].transcript;
        }
      }
      renderInterimLine(interim);
    };

    r.onerror = (e)=>{
      if(e.error === 'no-speech' || e.error === 'aborted'){
        // benign: engine paused on silence or we intentionally stopped it
        return;
      }
      if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
        toast('마이크 권한이 필요합니다.');
        stopRecording();
        return;
      }
      if(e.error === 'network'){
        console.warn('SpeechRecognition network hiccup, will auto-retry');
        return;
      }
      console.error('SpeechRecognition error:', e.error);
    };

    r.onend = ()=>{
      recognitionActive = false;
      // Chrome frequently ends the recognizer on its own (after a pause,
      // ~60s of continuous audio, etc). If the user still wants to record,
      // restart it right away so nothing is missed.
      if(isRecording){
        transcriptStatus.textContent = '다시 연결 중…';
        scheduleRestart(150);
      }
    };

    return r;
  }

  function scheduleRestart(delay){
    clearTimeout(restartTimeoutId);
    restartTimeoutId = setTimeout(()=>{
      if(!isRecording || !recognition) return;
      if(recognitionActive) return; // already running
      try{
        recognition.start();
      }catch(err){
        // "already started" race — back off and try again shortly
        scheduleRestart(300);
      }
    }, delay);
  }

  function startWatchdog(){
    lastResultAt = Date.now();
    watchdogInterval = setInterval(()=>{
      if(!isRecording) return;
      // If recognition silently died (no onend fired, but not active either), force a restart.
      if(!recognitionActive){
        scheduleRestart(50);
      }
    }, 4000);
  }
  function stopWatchdog(){
    clearInterval(watchdogInterval);
  }

  let interimLineEl = null;
  function ensureTranscriptCleared(){
    if(transcriptBody.querySelector('.empty')){
      transcriptBody.innerHTML = '';
    }
  }
  function renderFinalLine(text){
    ensureTranscriptCleared();
    if(interimLineEl){ interimLineEl.remove(); interimLineEl = null; }
    const line = document.createElement('div');
    line.className = 't-line';
    const time = document.createElement('span');
    time.className = 't-time';
    time.textContent = formatTime(secondsElapsed);
    line.appendChild(time);
    line.appendChild(document.createTextNode(text));
    transcriptBody.appendChild(line);
    transcriptBody.scrollTop = transcriptBody.scrollHeight;
  }
  function renderInterimLine(text){
    if(!text) return;
    ensureTranscriptCleared();
    if(!interimLineEl){
      interimLineEl = document.createElement('div');
      interimLineEl.className = 't-line t-interim';
      transcriptBody.appendChild(interimLineEl);
    }
    interimLineEl.textContent = text;
    transcriptBody.scrollTop = transcriptBody.scrollHeight;
  }

  // ---------- Waveform (mic level visual) ----------
  async function startWaveform(){
    try{
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(micStream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 64;
      source.connect(analyser);
      drawWave();
    }catch(err){
      console.error('mic access error', err);
      toast('마이크에 접근할 수 없습니다. 권한을 확인해 주세요.');
    }
  }
  function drawWave(){
    const bufferLength = analyser.frequencyBinCount;
    const data = new Uint8Array(bufferLength);
    const w = waveformCanvas.width, h = waveformCanvas.height;
    function tick(){
      waveAnimId = requestAnimationFrame(tick);
      analyser.getByteFrequencyData(data);
      waveCtx.clearRect(0,0,w,h);
      const barW = w / bufferLength;
      for(let i=0;i<bufferLength;i++){
        const v = data[i] / 255;
        const barH = Math.max(2, v * h);
        waveCtx.fillStyle = '#C6462E';
        waveCtx.fillRect(i*barW, h - barH, barW*0.7, barH);
      }
    }
    tick();
  }
  function stopWaveform(){
    if(waveAnimId) cancelAnimationFrame(waveAnimId);
    waveCtx.clearRect(0,0,waveformCanvas.width, waveformCanvas.height);
    if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream = null; }
    if(audioCtx){ audioCtx.close(); audioCtx = null; }
  }

  // ---------- Recording control ----------
  recBtn.addEventListener('click', ()=>{
    if(isRecording) stopRecording(); else startRecording();
  });

  function startRecording(){
    recognition = initRecognition();
    if(!recognition) return;
    isRecording = true;
    recognitionActive = false;
    recBtn.classList.add('recording');
    recBtnLabel.textContent = '녹음 중지';
    transcriptStatus.textContent = '연결 중…';
    startTimer();
    startWaveform();
    startWatchdog();
    try{
      recognition.start();
    }catch(e){
      console.warn('initial start failed, retrying', e);
      scheduleRestart(300);
    }
    restartAutoOrganizeTimer();
  }

  function stopRecording(){
    isRecording = false;
    recBtn.classList.remove('recording');
    recBtnLabel.textContent = '녹음 시작';
    transcriptStatus.textContent = '대기 중';
    stopTimer();
    stopWaveform();
    stopWatchdog();
    clearTimeout(restartTimeoutId);
    if(recognition){
      try{ recognition.onend = null; recognition.stop(); }catch(e){}
    }
    recognitionActive = false;
    clearInterval(organizeTimer);
    // final organize pass on stop, if there's unprocessed content
    if(sinceLastOrganize.trim()){
      organizeNotes();
    }
  }

  function restartAutoOrganizeTimer(){
    clearInterval(organizeTimer);
    if(autoInterval > 0){
      organizeTimer = setInterval(()=>{
        if(sinceLastOrganize.trim()) organizeNotes();
      }, autoInterval);
    }
  }

  // ---------- OpenAI calls ----------
  async function callOpenAI(messages){
    if(!apiKey){
      toast('설정(⚙)에서 OpenAI API 키를 먼저 입력해 주세요.');
      settingsPopover.classList.add('open');
      return null;
    }
    try{
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + apiKey
        },
        body: JSON.stringify({
          model: model,
          messages: messages,
          temperature: 0.3
        })
      });
      if(!res.ok){
        const errBody = await res.text();
        console.error('OpenAI API error', res.status, errBody);
        toast('OpenAI 요청 실패 (' + res.status + '). 브라우저 콘솔을 확인해 주세요.');
        return null;
      }
      const data = await res.json();
      return data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : null;
    }catch(err){
      console.error('network / CORS error calling OpenAI', err);
      toast('요청 중 오류가 발생했습니다 (네트워크/CORS). 콘솔을 확인해 주세요.');
      return null;
    }
  }

  function getCurrentBulletsPlainText(){
    const items = notesEditor.querySelectorAll('li');
    if(items.length === 0) return notesEditor.innerText.trim();
    return Array.from(items).map(li => '- ' + li.innerText.trim()).join('\n');
  }

  function renderBullets(bulletText){
    // bulletText expected as lines, optionally starting with -, *, • or numbers
    const lines = bulletText.split('\n')
      .map(l => l.replace(/^[\s\-\*•\d\.\)]+/, '').trim())
      .filter(l => l.length > 0);
    const ul = document.createElement('ul');
    lines.forEach(line=>{
      const li = document.createElement('li');
      li.textContent = line;
      ul.appendChild(li);
    });
    notesEditor.innerHTML = '';
    notesEditor.appendChild(ul);
    notesCount.textContent = lines.length + '개 항목';
  }

  async function organizeNotes(){
    if(isOrganizing) return;
    isOrganizing = true;
    organizingFlag.classList.add('show');
    const existing = getCurrentBulletsPlainText();
    const newChunk = sinceLastOrganize;
    const sys = '당신은 회의록 정리 보조원입니다. 아래의 "기존 회의록 요약"과 "새로 들어온 발화 내용"을 종합하여, 하나의 완성된 한국어 불렛포인트 회의록을 다시 작성하세요. ' +
      '규칙: (1) 각 줄은 "- "로 시작하는 하나의 불렛으로만 작성 (2) 중복되는 내용은 병합 (3) 결정사항, 논의 안건, 실행 항목(액션 아이템)을 자연스럽게 구분해 작성 (4) 불필요한 추임새나 잡담은 제외 (5) 다른 설명 없이 불렛 목록만 출력.';
    const userMsg = '기존 회의록 요약:\n' + (existing || '(없음)') + '\n\n새로 들어온 발화 내용:\n' + newChunk;
    const result = await callOpenAI([
      { role: 'system', content: sys },
      { role: 'user', content: userMsg }
    ]);
    isOrganizing = false;
    organizingFlag.classList.remove('show');
    if(result){
      renderBullets(result);
      sinceLastOrganize = '';
    }
  }

  // Manual revise via bottom prompt
  reviseBtn.addEventListener('click', reviseNotes);
  promptInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){ e.preventDefault(); reviseNotes(); }
  });

  async function reviseNotes(){
    const instruction = promptInput.value.trim();
    if(!instruction){ toast('수정 지시를 입력해 주세요.'); return; }
    if(isRevising) return;
    const existing = getCurrentBulletsPlainText();
    if(!existing){ toast('아직 정리된 회의록이 없습니다.'); return; }
    isRevising = true;
    reviseBtn.disabled = true;
    reviseBtn.textContent = '반영 중…';
    const sys = '당신은 회의록 정리 보조원입니다. 아래 "현재 회의록"을 사용자의 "수정 지시"에 따라 다시 작성하세요. ' +
      '규칙: (1) 각 줄은 "- "로 시작하는 하나의 불렛으로만 작성 (2) 지시에 없는 내용은 최대한 원래대로 유지 (3) 다른 설명 없이 불렛 목록만 출력.';
    const userMsg = '현재 회의록:\n' + existing + '\n\n수정 지시:\n' + instruction;
    const result = await callOpenAI([
      { role: 'system', content: sys },
      { role: 'user', content: userMsg }
    ]);
    isRevising = false;
    reviseBtn.disabled = false;
    reviseBtn.textContent = '수정 반영';
    if(result){
      renderBullets(result);
      promptInput.value = '';
      toast('회의록에 반영했습니다.');
    }
  }

  // ---------- Save as .txt ----------
  saveBtn.addEventListener('click', ()=>{
    const text = getCurrentBulletsPlainText();
    if(!text){ toast('저장할 회의록 내용이 없습니다.'); return; }
    const now = new Date();
    const pad = n => n.toString().padStart(2,'0');
    const fname = `회의록_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}.txt`;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('저장했습니다: ' + fname);
  });

  // Warn upfront if browser doesn't support speech recognition
  if(!getRecognitionCtor()){
    transcriptStatus.textContent = '미지원 브라우저';
  }
})();
</script>
</body>
</html>
